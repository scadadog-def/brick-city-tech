name: Security

on:
  pull_request:
    branches:
      - develop
  schedule:
    - cron: "0 9 * * 1" # weekly Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: npm audit (high only)
        run: |
          # fail only on high/critical for now
          npm audit --audit-level=high
