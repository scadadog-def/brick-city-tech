name: Bug report
description: Report something broken
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: "When I click ..., I expected ..., but ..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console errors, network traces, screenshots, etc.
    validations:
      required: false

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Browser/OS or API client details"
    validations:
      required: false
